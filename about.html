<!DOCTYPE html>
<html lang="kz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Logo.png">
    <title>Колледж туралы - Қызылорда жоғары медициналық колледжі</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0056b3;
            --primary-hover: #004494;
            --text-dark: #2d3748;
            --text-light: #718096;
            --bg-white: #ffffff;
            --bg-light: #f7fafc;
            --danger-color: #e53e3e;
            --shadow: 0 10px 25px rgba(0, 86, 179, 0.08);
            --transition: all 0.3s ease;
            --border-radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; color: var(--text-dark); background-color: var(--bg-light); line-height: 1.6; }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .hidden { display: none !important; }

        /* HEADER */
        header { position: fixed; top: 0; left: 0; width: 100%; background-color: rgba(255,255,255,0.95); backdrop-filter: blur(10px); box-shadow: 0 2px 15px rgba(0,0,0,0.05); z-index: 1000; }
        .navbar { display: flex; justify-content: space-between; align-items: center; height: 80px; }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary-color); display: flex; align-items: center; gap: 10px; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { font-weight: 600; font-size: 15px; position: relative; transition: var(--transition); }
        .nav-links a:hover, .nav-links a.active { color: var(--primary-color); }
        .nav-links a::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background-color: var(--primary-color); transition: var(--transition); }
        .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
        .lang-switcher { display: flex; gap: 5px; background: var(--bg-light); padding: 4px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .lang-btn { background: transparent; border: none; padding: 6px 12px; font-weight: 600; cursor: pointer; border-radius: 6px; color: var(--text-light); transition: var(--transition); }
        .lang-btn.active { background: var(--primary-color); color: #fff; box-shadow: 0 2px 5px rgba(0,86,179,0.2); }
        .mobile-menu-btn { display: none; font-size: 24px; color: var(--primary-color); cursor: pointer; }

        /* PAGE HERO */
        .page-hero { padding: 130px 20px 60px; background: linear-gradient(135deg, #e3f2fd 0%, var(--bg-white) 100%); text-align: center; }
        .page-hero h1 { font-size: 40px; font-weight: 800; color: var(--primary-color); margin-bottom: 12px; }
        .page-hero p { color: var(--text-light); font-size: 17px; max-width: 600px; margin: 0 auto; }

        /* CONTENT */
        .content-area { max-width: 900px; margin: 50px auto 80px; padding: 0 20px; }
        .content-item { background: var(--bg-white); border-radius: var(--border-radius); padding: 30px; margin-bottom: 25px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.04); transition: var(--transition); }
        .content-item:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
        .content-item h3 { font-size: 20px; color: var(--text-dark); margin-bottom: 12px; }
        .content-item p { color: var(--text-light); font-size: 15px; line-height: 1.8; white-space: pre-wrap; }
        .content-item img { max-width: 100%; border-radius: 10px; margin-top: 18px; }

        .admin-controls { display: flex; gap: 10px; margin-top: 18px; }
        .btn-edit, .btn-delete { padding: 9px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; transition: var(--transition); display: flex; align-items: center; gap: 6px; }
        .btn-edit { background: #fefcbf; color: #744210; border: 1px solid #f6e05e; }
        .btn-edit:hover { background: #f6e05e; }
        .btn-delete { background: #fff5f5; color: var(--danger-color); border: 1px solid #feb2b2; }
        .btn-delete:hover { background: var(--danger-color); color: #fff; }

        /* ADMIN FORM */
        .admin-form { background: var(--bg-white); border-radius: var(--border-radius); padding: 30px; margin-bottom: 30px; border: 2px solid var(--primary-color); box-shadow: var(--shadow); }
        .admin-form h3 { color: var(--primary-color); margin-bottom: 20px; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: var(--text-dark); }
        .form-group input, .form-group textarea { width: 100%; padding: 12px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; transition: var(--transition); background: var(--bg-light); }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary-color); background: #fff; box-shadow: 0 0 0 3px rgba(0,86,179,0.08); }
        .btn-submit { width: 100%; padding: 13px; background: var(--primary-color); color: #fff; border: none; border-radius: 8px; font-weight: 600; font-size: 15px; cursor: pointer; transition: var(--transition); }
        .btn-submit:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-logout { width: 100%; padding: 11px; background: transparent; color: var(--text-light); border: 1px solid #e2e8f0; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: var(--transition); }
        .btn-logout:hover { background: var(--bg-light); color: var(--text-dark); }

        /* LOADING */
        .loading { text-align: center; padding: 60px; color: var(--text-light); }
        .loading i { font-size: 36px; color: var(--primary-color); margin-bottom: 15px; display: block; }

        /* FOOTER */
        footer { background: #1a202c; color: #fff; padding: 40px 20px; text-align: center; }
        .socials { margin-bottom: 20px; display: flex; justify-content: center; gap: 15px; }
        .socials a { width: 40px; height: 40px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; transition: var(--transition); }
        .socials a:hover { background: var(--primary-color); transform: translateY(-3px); }
        .admin-login-link { color: #4a5568; font-size: 12px; cursor: pointer; margin-top: 15px; display: inline-block; transition: color 0.3s; }
        .admin-login-link:hover { color: #fff; }

        @media (max-width: 992px) {
            .nav-links { position: fixed; top: 80px; right: -100%; width: 100%; height: calc(100vh - 80px); background: rgba(255,255,255,0.98); flex-direction: column; justify-content: center; transition: 0.4s; }
            .nav-links.active { right: 0; }
            .mobile-menu-btn { display: block; }
            .page-hero h1 { font-size: 28px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container navbar">
            <a href="index.html" class="logo"><img src="Logo.png" alt="Логотип" style="height:52px;width:auto;"></a>
            <nav>
                <ul class="nav-links">
                    <li><a href="about.html" class="active" data-i18n="nav-about">Колледж туралы</a></li>
                    <li><a href="entrants.html" data-i18n="nav-entrants">Талапкерге</a></li>
                    <li><a href="students.html" data-i18n="nav-students">Студентке</a></li>
                    <li><a href="index.html#news-section" data-i18n="nav-news">Жаңалықтар</a></li>
                    <li><a href="index.html#contacts" data-i18n="nav-contacts">Байланыс</a></li>
                    <li>
                        <div class="lang-switcher">
                            <button class="lang-btn" data-lang="kz">KZ</button>
                            <button class="lang-btn" data-lang="ru">RU</button>
                            <button class="lang-btn" data-lang="en">EN</button>
                        </div>
                    </li>
                </ul>
            </nav>
            <div class="mobile-menu-btn"><i class="fa-solid fa-bars"></i></div>
        </div>
    </header>

    <div class="page-hero">
        <div class="container">
            <h1 data-i18n="page-title">Колледж туралы</h1>
            <p data-i18n="page-subtitle">Қызылорда жоғары медициналық колледжі туралы ақпарат</p>
        </div>
    </div>

    <div class="content-area">
        <div id="admin-panel" class="hidden">
            <div class="admin-form">
                <h3><i class="fa-solid fa-pen-to-square"></i> <span data-i18n="admin-add">Жаңа блок қосу</span></h3>
                <div class="form-group">
                    <label data-i18n="label-title">Тақырып</label>
                    <input type="text" id="input-title" placeholder="Заголовок блока">
                </div>
                <div class="form-group">
                    <label data-i18n="label-text">Мәтін</label>
                    <textarea id="input-text" rows="5" placeholder="Текст блока..."></textarea>
                </div>
                <div class="form-group">
                    <label data-i18n="label-image">Сурет (міндетті емес)</label>
                    <input type="file" id="input-image" accept="image/*" style="padding:8px;">
                    <div id="upload-status" style="font-size:13px;color:#718096;margin-top:6px;display:none;"></div>
                </div>
                <button class="btn-submit" id="add-btn" data-i18n="btn-add">Қосу</button>
                <button class="btn-logout" id="logout-btn" data-i18n="btn-logout">Панельден шығу</button>
            </div>
        </div>

        <div id="content-container">
            <div class="loading">
                <i class="fa-solid fa-circle-notch fa-spin"></i>
                <p data-i18n="loading">Жүктелуде...</p>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="socials">
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-telegram"></i></a>
                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
            </div>
            <p>&copy; 2026 Қызылорда жоғары медициналық колледжі. Барлық құқықтар қорғалған.</p>
            <span class="admin-login-link" id="admin-login-trigger">Вход для администратора</span>
        </div>
    </footer>

    <script>
        const BASE_URL = "https://qzomedicalcollege-default-rtdb.firebaseio.com/about";
        let pageData = {};

        const i18n = {
            'nav-about':    { kz: "Колледж туралы",   ru: "О колледже",       en: "About" },
            'nav-entrants': { kz: "Талапкерге",        ru: "Абитуриентам",     en: "Applicants" },
            'nav-students': { kz: "Студентке",         ru: "Студентам",        en: "Students" },
            'nav-news':     { kz: "Жаңалықтар",        ru: "Новости",          en: "News" },
            'nav-contacts': { kz: "Байланыс",          ru: "Контакты",         en: "Contacts" },
            'page-title':   { kz: "Колледж туралы",   ru: "О колледже",       en: "About College" },
            'page-subtitle':{ kz: "Қызылорда жоғары медициналық колледжі туралы ақпарат", ru: "Информация о Кызылординском высшем медицинском колледже", en: "Information about Kyzylorda Higher Medical College" },
            'admin-add':    { kz: "Жаңа блок қосу",   ru: "Добавить блок",    en: "Add block" },
            'label-title':  { kz: "Тақырып",           ru: "Заголовок",        en: "Title" },
            'label-text':   { kz: "Мәтін",             ru: "Текст",            en: "Text" },
            'label-image':  { kz: "Сурет (міндетті емес)", ru: "Изображение (необязательно)", en: "Image (optional)" },
            'btn-add':      { kz: "Қосу",              ru: "Добавить",         en: "Add" },
            'btn-logout':   { kz: "Панельден шығу",    ru: "Выйти из панели",  en: "Logout" },
            'loading':      { kz: "Жүктелуде...",      ru: "Загрузка...",      en: "Loading..." },
            'btn-edit':     { kz: "Өңдеу",             ru: "Редактировать",    en: "Edit" },
            'btn-delete':   { kz: "Жою",               ru: "Удалить",          en: "Delete" },
            'empty':        { kz: "Ақпарат әлі қосылмаған.", ru: "Информация пока не добавлена.", en: "No information yet." },
            'db-error':     { kz: "Деректер базасын жүктеу қатесі.", ru: "Ошибка загрузки базы данных.", en: "Database loading error." },
        };

        function setLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[key] && i18n[key][lang]) el.textContent = i18n[key][lang];
            });
            document.documentElement.lang = lang;
            localStorage.setItem('site_lang', lang);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
            });
        }

        function getLang() { return localStorage.getItem('site_lang') || 'kz'; }

        function checkAdminState() {
            const isAdmin = localStorage.getItem('isMedAdmin') === 'true';
            document.getElementById('admin-panel').classList.toggle('hidden', !isAdmin);
            return isAdmin;
        }

        async function loadContent() {
            const container = document.getElementById('content-container');
            const lang = getLang();
            container.innerHTML = `<div class="loading"><i class="fa-solid fa-circle-notch fa-spin"></i><p>${i18n.loading[lang]}</p></div>`;
            try {
                const res = await fetch(`${BASE_URL}.json`);
                pageData = await res.json();
                container.innerHTML = '';

                if (!pageData) {
                    container.innerHTML = `<p style="text-align:center;color:#888;padding:60px;">${i18n.empty[lang]}</p>`;
                    return;
                }

                const isAdmin = localStorage.getItem('isMedAdmin') === 'true';
                Object.entries(pageData).reverse().forEach(([key, item]) => {
                    const imgHtml = item.image ? `<img src="${item.image}" alt="">` : '';
                    const adminBtns = isAdmin ? `
                        <div class="admin-controls">
                            <button class="btn-edit" onclick="editItem('${key}')"><i class="fa-solid fa-pencil"></i> ${i18n['btn-edit'][lang]}</button>
                            <button class="btn-delete" onclick="deleteItem('${key}')"><i class="fa-solid fa-trash"></i> ${i18n['btn-delete'][lang]}</button>
                        </div>` : '';
                    const div = document.createElement('div');
                    div.className = 'content-item';
                    div.innerHTML = `<h3>${item.title}</h3><p>${parseLinks(item.text)}</p>${imgHtml}${adminBtns}`;
                    container.appendChild(div);
                });
            } catch(e) {
                console.error('Firebase error:', e);
                container.innerHTML = `<p style="color:red;text-align:center;padding:40px;">${i18n['db-error'][getLang()]}<br><small style="font-size:12px;opacity:0.7">${e.message}</small></p>`;
            }
        }

        async function deleteItem(id) {
            if (confirm(getLang() === 'kz' ? 'Бұл блокты жойғыңыз келе ме?' : 'Удалить этот блок?')) {
                await fetch(`${BASE_URL}/${id}.json`, { method: 'DELETE' });
                loadContent();
            }
        }

        async function editItem(id) {
            const newText = prompt(getLang() === 'kz' ? 'Мәтінді өңдеңіз:' : 'Редактировать текст:', pageData[id].text);
            if (newText !== null && newText.trim()) {
                await fetch(`${BASE_URL}/${id}.json`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: newText })
                });
                loadContent();
            }
        }

        document.getElementById('admin-login-trigger').addEventListener('click', () => {
            if (localStorage.getItem('isMedAdmin') !== 'true') {
                const login = prompt('Логин:');
                const pass = prompt('Пароль:');
                if (login === 'QMHC' && pass === 'CHMQ') {
                    localStorage.setItem('isMedAdmin', 'true');
                    checkAdminState();
                    loadContent();
                } else { alert('Деректер қате!'); }
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('isMedAdmin');
            checkAdminState();
            loadContent();
        });

        document.getElementById('add-btn').addEventListener('click', async () => {
            const title = document.getElementById('input-title').value.trim();
            const text = document.getElementById('input-text').value.trim();
            const fileInput = document.getElementById('input-image');
            const statusEl = document.getElementById('upload-status');

            if (!title || !text) return alert(getLang() === 'kz' ? 'Тақырып пен мәтінді толтырыңыз!' : 'Заполните заголовок и текст!');

            const addBtn = document.getElementById('add-btn');
            addBtn.disabled = true;
            let imageUrl = '';

            try {
                if (fileInput.files && fileInput.files[0]) {
                    statusEl.style.display = 'block';
                    statusEl.textContent = getLang() === 'kz' ? 'Сурет жүктелуде...' : 'Загрузка изображения...';
                    addBtn.textContent = '...';

                    const formData = new FormData();
                    formData.append('image', fileInput.files[0]);

                    const imgRes = await fetch('https://api.imgbb.com/1/upload?key=e743803bf9be739f3ae6fc6cabda585f', {
                        method: 'POST', body: formData
                    });
                    const imgData = await imgRes.json();

                    if (imgData.success) {
                        imageUrl = imgData.data.url;
                        statusEl.textContent = getLang() === 'kz' ? '✅ Сурет жүктелді' : '✅ Изображение загружено';
                    } else {
                        throw new Error('ImgBB error');
                    }
                }

                await fetch(`${BASE_URL}.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, text, image: imageUrl, timestamp: Date.now() })
                });

                document.getElementById('input-title').value = '';
                document.getElementById('input-text').value = '';
                fileInput.value = '';
                statusEl.style.display = 'none';
                loadContent();

            } catch(e) {
                alert(getLang() === 'kz' ? 'Қате: ' + e.message : 'Ошибка: ' + e.message);
            } finally {
                addBtn.disabled = false;
                addBtn.textContent = document.querySelector('[data-i18n="btn-add"]')?.getAttribute('data-i18n') === 'btn-add'
                    ? (i18n['btn-add'][getLang()] || 'Қосу') : 'Қосу';
            }
        });


// Парсинг ссылок в тексте: [текст](url) и голые https://...
function parseLinks(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    let safe = div.innerHTML;
    safe = safe.replace(/\n/g, '<br>');
    // [текст](https://...) → кликабельная ссылка
    safe = safe.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
        '<a href="$2" target="_blank" rel="noopener noreferrer" style="color:#0056b3;font-weight:600;text-decoration:underline;">$1</a>');
    // голый https://... → кликабельная ссылка
    safe = safe.replace(/(?<![="'\(])(https?:\/\/[^\s<,)]+)/g,
        '<a href="$1" target="_blank" rel="noopener noreferrer" style="color:#0056b3;text-decoration:underline;">$1</a>');
    return safe;
}

        document.addEventListener('DOMContentLoaded', () => {
            setLanguage(localStorage.getItem('site_lang') || 'kz');
            document.querySelectorAll('.lang-btn').forEach(btn =>
                btn.addEventListener('click', e => setLanguage(e.target.getAttribute('data-lang')))
            );
            const mobileBtn = document.querySelector('.mobile-menu-btn');
            const navLinks = document.querySelector('.nav-links');
            mobileBtn.addEventListener('click', () => navLinks.classList.toggle('active'));
            navLinks.querySelectorAll('a').forEach(link => link.addEventListener('click', () => navLinks.classList.remove('active')));
            checkAdminState();
            loadContent();
        });
    </script>
</body>
</html>
