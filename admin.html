<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора ВМК</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 20px; background: #f4f7f6; color: #333; }
        .container { max-width: 800px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        input:focus, textarea:focus { outline: none; border-color: #0056b3; }
        button { padding: 12px 20px; background: #0056b3; color: white; border: none; cursor: pointer; border-radius: 6px; font-weight: 600; width: 100%; transition: 0.3s; }
        button:hover { background: #004494; }
        button:disabled { background: #a0aec0; cursor: not-allowed; }
        button.danger { background: #dc3545; width: auto; }
        button.danger:hover { background: #c82333; }
        .news-item { border: 1px solid #eee; padding: 15px; margin-top: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; background: #fafafa; }
    </style>
</head>
<body>

<div class="container">
    <!-- Форма входа -->
    <div id="login-section">
        <h2 style="color: #0056b3; margin-bottom: 20px;">Вход в админ-панель</h2>
        <form id="login-form">
            <div class="form-group">
                <input type="text" id="login" placeholder="Логин (введите admin)" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Пароль (введите admin)" required>
            </div>
            <button type="submit">Войти в систему</button>
        </form>
    </div>

    <!-- Панель управления новостями -->
    <div id="dashboard-section" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 style="color: #0056b3; margin: 0;">Добавление новостей</h2>
            <button id="logout-btn" class="danger">Выйти</button>
        </div>
        
        <form id="news-form">
            <div class="form-group">
                <label>Заголовок новости</label>
                <input type="text" id="news_title" placeholder="Например: Студенты прошли практику..." required>
            </div>
            <div class="form-group">
                <label>Текст новости</label>
                <textarea id="news_text" placeholder="Подробное описание..." rows="5" required></textarea>
            </div>
            <div class="form-group">
                <label>Прикрепить фото (автоматически загрузится на сервер)</label>
                <input type="file" id="news_image" accept="image/*">
            </div>
            <button type="submit" id="news-submit-btn">Опубликовать новость</button>
        </form>

        <hr style="border: none; border-top: 1px solid #eee; margin: 40px 0;">

        <h3>Список опубликованных новостей</h3>
        <div id="news-list">Загрузка данных из базы...</div>
    </div>
</div>

<!-- Подключаем логику -->
<script src="admin.js"></script>
</body>
</html>
